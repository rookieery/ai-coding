version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gomoku-db-dev
    environment:
      POSTGRES_DB: gomoku
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 可选: 添加 pgAdmin 用于数据库管理
  pgadmin:
    image: dpage/pgadmin4
    container_name: gomoku-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gomoku.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    container_name: gomoku-app-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/gomoku?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-development
      PORT: 3001
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data: